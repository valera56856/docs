; Pytest configuration for the Valeraup backend.
;
; ``DJANGO_SETTINGS_MODULE`` points pytest-django at the project settings so the
; test database, apps, and DRF wiring are all available. ``pythonpath = .``
; makes ``valeraup``, ``apps.*`` and ``integrations.*`` importable when pytest is
; run from the ``backend/`` directory.
[pytest]
DJANGO_SETTINGS_MODULE = valeraup.settings
python_files = test_*.py tests_*.py *_test.py
pythonpath = .
addopts = -ra --strict-markers
testpaths = tests
