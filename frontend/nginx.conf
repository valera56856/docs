# nginx config for serving the Valeraup SPA.
#
# Key behaviors:
# - try_files history fallback: any unknown path returns index.html so the
#   React Router client routes (/receipt/:id, /admin, ...) resolve on reload.
# - long-cache hashed assets, but never cache index.html or the service worker
#   so clients always pick up new deployments.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets to cut transfer size on mobile networks.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The service worker and manifest must always revalidate so updates land.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA history fallback.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
