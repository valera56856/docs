<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <!-- Mobile-first: lock to device width, allow notch-safe areas via viewport-fit. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- Matches the PWA / Capacitor theme color (NextCRM navy). -->
    <meta name="theme-color" content="#0A1A3F" />
    <meta
      name="description"
      content="Valeraup — recognize supplier invoices and generate Excel receipts for SalesDrive."
    />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Inter is the NextCRM brand typeface. Preconnect to reduce font latency. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Valeraup</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
